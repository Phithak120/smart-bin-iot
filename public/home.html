<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="scanline"></div>

    <nav class="navbar navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🗑️ Smart Bin Status</a>
            <div class="d-flex gap-2">
                <a href="/history.html" class="btn btn-outline-light btn-sm">ประวัติ</a>
                <a href="/summary.html" class="btn btn-outline-light btn-sm">สรุปผลกราฟ</a>
                <a href="/control.html" class="btn btn-outline-light btn-sm"
                    style="border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 10px var(--cyan-soft);">
                    ควบคุม</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="main-card text-center mb-4 shadow-sm border-0">

                    <div id="realtime-date" class="text-muted mb-1">กำลังโหลดวันที่...</div>
                    <div id="realtime-clock" class="display-6 fw-bold text-primary mb-3">00:00:00</div>

                    <hr>

                    <h5 class="fw-bold mb-3">ระดับขยะในถัง</h5>
                    <div class="progress mb-4" style="height: 35px;">
                        <div id="trash-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                            style="width: 0%">0%</div>
                    </div>

                    <div class="mt-3 border-top pt-3 text-center">
                        <small class="text-muted d-block" style="margin-bottom: 8px;">เซนเซอร์ตรวจจับคน</small>
                        <span id="proximity-status" class="badge bg-secondary p-2 mt-1">ปกติ</span>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script src="home.js"></script>
</body>

</html>
