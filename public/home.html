<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Bin Dashboard — ติดตามสถานะถังขยะอัจฉริยะแบบ Real-time">
    <title>Smart Bin · Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <span class="brand-dot"></span>
                Smart Bin
            </a>
            <div class="nav-actions">
                <a href="/history.html" class="btn-nav">ประวัติ</a>
                <a href="/summary.html" class="btn-nav">วิเคราะห์</a>
                <a href="/control.html" class="btn-nav">ควบคุม</a>
                <a href="/login.html" id="auth-btn" class="btn-nav btn-accent" style="display:none;">กำลังตรวจสอบ...</a>
            </div>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="card card--accent">
            <div id="realtime-date">กำลังโหลด...</div>
            <div id="realtime-clock">00:00:00</div>

            <hr class="divider">

            <div class="section-label">ระดับขยะในถัง</div>
            <div class="progress mb-3" style="height: 25px;">
                <div id="trash-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                    style="width: 0%; font-weight: bold;">0%</div>
            </div>

            <div
                style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-top:16px; padding-top:16px; border-top:1px solid var(--border);">
                <span class="section-label" style="margin-bottom:0;">เซนเซอร์ตรวจจับคน</span>
                <span id="person-status" class="badge bg-secondary"
                    style="padding: 8px 16px; font-size: 0.9rem;">ปกติ</span>
            </div>
        </div>
    </div>

    <script src="home.js"></script>
</body>

</html>
