<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bin Summary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="scanline"></div>

    <nav class="navbar navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">📊 Summary</a>
            <a href="/" class="btn btn-outline-light btn-sm">กลับหน้าหลัก</a>
        </div>
        <a href="/api/logout" class="btn btn-outline-light btn-sm"
            style="border-color: var(--danger); color: var(--danger);">ออกจากระบบ</a>
    </nav>

    <div class="container mt-4 text-center">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="main-card">
                    <h5 class="fw-bold mb-4">กราฟวิเคราะห์ปริมาณขยะ</h5>

                    <div style="height: 350px; position: relative;">
                        <canvas id="myChart"></canvas>
                    </div>

                    <div id="analysis-text"
                        class="alert mt-4 text-start d-flex align-items-center justify-content-center gap-3">
                        <span class="spinner-border spinner-border-sm text-success" role="status"
                            aria-hidden="true"></span>
                        กำลังรวบรวมข้อมูล...
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="summary.js"></script>
</body>

</html>
