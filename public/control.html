<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bin - Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="scanline"></div>

    <nav class="navbar navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">⚙️ Control Panel</a>
            <a href="/" class="btn btn-outline-light btn-sm">กลับหน้าหลัก</a>
        </div>
        <a href="/api/logout" class="btn btn-outline-light btn-sm"
            style="border-color: var(--danger); color: var(--danger);">ออกจากระบบ</a>
    </nav>

    <div class="container mt-4 text-center">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="main-card">
                    <h5 class="fw-bold mb-4 text-danger"
                        style="color: var(--danger) !important; text-shadow: 0 0 15px var(--danger-glow);">
                        ระบบสั่งการฉุกเฉิน (MANUAL OVERRIDE)</h5>

                    <div class="mb-4 text-start border-bottom border-secondary pb-4"
                        style="border-color: var(--border2) !important;">
                        <small class="text-muted d-block mb-3">LID CONTROL // ควบคุมฝาถังขยะ</small>
                        <div class="row g-3">
                            <div class="col-6">
                                <button class="btn btn-outline-light w-100 py-3"
                                    style="border-color: var(--cyan); color: var(--cyan);"
                                    onclick="sendControl('lid', 'OPEN')">🔓 เปิดฝา (OPEN)</button>
                            </div>
                            <div class="col-6">
                                <button class="btn btn-outline-light w-100 py-3"
                                    style="border-color: var(--danger); color: var(--danger);"
                                    onclick="sendControl('lid', 'CLOSE')">🔒 ปิดฝา (CLOSE)</button>
                            </div>
                        </div>
                        <div class="mt-3 text-end">
                            <small class="text-muted">สถานะฝาถัง: <span id="lid-status"
                                    class="fw-bold">กำลังโหลด...</span></small>
                        </div>
                    </div>

                    <div class="text-start">
                        <small class="text-muted d-block mb-3">BUZZER CONTROL // ระบบเสียงเตือน</small>
                        <div class="row g-3 mb-2">
                            <div class="col-6">
                                <button class="btn btn-outline-light w-100 py-2"
                                    style="border-color: var(--warn); color: var(--warn);"
                                    onclick="sendControl('buzzer', 'ON')">🔊 เปิดเสียง (ON)</button>
                            </div>
                            <div class="col-6">
                                <button class="btn btn-outline-light w-100 py-2"
                                    onclick="sendControl('buzzer', 'OFF')">🔇 ปิดเสียง (OFF)</button>
                            </div>
                        </div>

                        <div class="mb-4 text-end">
                            <small class="text-muted">สถานะเสียงเตือน: <span id="buzzer-status"
                                    class="fw-bold">กำลังโหลด...</span></small>
                        </div>

                        <div class="px-2">
                            <label class="form-label text-muted small mb-2 d-flex justify-content-between">
                                <span>ระดับความดัง (VOLUME)</span>
                                <span><span id="vol-label" class="fw-bold"
                                        style="color: var(--cyan);">100</span>%</span>
                            </label>
                            <input type="range" class="form-range" min="0" max="100" id="vol-slider"
                                onchange="sendVolume(this.value)">
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script src="control.js"></script>
</body>

</html>
