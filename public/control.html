<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Bin — ระบบควบคุมถังขยะอัจฉริยะ">
    <title>Smart Bin · ควบคุม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <span class="brand-dot"></span>
                ควบคุม
            </a>
            <div class="nav-actions">
                <a href="/" class="btn-nav">หน้าหลัก</a>
                <a href="/api/logout" class="btn-nav btn-danger">ออกจากระบบ</a>
            </div>
        </div>
    </nav>

    <div class="page-wrap">

        <!-- Lid Control -->
        <div class="card">
            <div class="card-title">
                <span class="card-title-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg>
                </span>
                ควบคุมฝาถัง
            </div>

            <div class="ctrl-btn-grid mb-3">
                <button class="ctrl-action-btn accent" onclick="sendControl('lid', 'OPEN')">
                    <span class="btn-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <span class="btn-label">เปิดฝา</span>
                    <span class="btn-sub">OPEN</span>
                </button>
                <button class="ctrl-action-btn red" onclick="sendControl('lid', 'CLOSE')">
                    <span class="btn-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
                    </span>
                    <span class="btn-label">ปิดฝา</span>
                    <span class="btn-sub">CLOSE</span>
                </button>
            </div>

            <div class="ctrl-status-row">
                <span class="ctrl-status-label">สถานะฝาถัง</span>
                <span id="lid-status" class="ctrl-status-val">กำลังโหลด...</span>
            </div>
        </div>

        <!-- Buzzer Control -->
        <div class="card">
            <div class="card-title">
                <span class="card-title-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                </span>
                ระบบเสียงเตือน
            </div>

            <div class="ctrl-btn-grid mb-3">
                <button class="ctrl-action-btn amber" onclick="sendControl('buzzer', 'ON')">
                    <span class="btn-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    </span>
                    <span class="btn-label">เปิดเสียง</span>
                    <span class="btn-sub">ON</span>
                </button>
                <button class="ctrl-action-btn muted" onclick="sendControl('buzzer', 'OFF')">
                    <span class="btn-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" x2="17" y1="9" y2="15"/><line x1="17" x2="23" y1="9" y2="15"/></svg>
                    </span>
                    <span class="btn-label">ปิดเสียง</span>
                    <span class="btn-sub">OFF</span>
                </button>
            </div>

            <div class="ctrl-status-row mb-4">
                <span class="ctrl-status-label">สถานะเสียงเตือน</span>
                <span id="buzzer-status" class="ctrl-status-val">กำลังโหลด...</span>
            </div>

            <div class="volume-wrap">
                <div class="volume-header">
                    <span class="volume-title">ระดับเสียง</span>
                    <span class="volume-value">
                        <span id="vol-label">100</span><sup style="font-size:13px; color:var(--text-muted);">%</sup>
                    </span>
                </div>
                <input type="range" class="volume-slider" min="0" max="100" id="vol-slider"
                       onchange="sendVolume(this.value)"
                       oninput="document.getElementById('vol-label').textContent = this.value">
            </div>
        </div>

    </div>

    <script src="control.js"></script>
</body>
</html>
