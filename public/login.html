<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Bin — เข้าสู่ระบบจัดการถังขยะอัจฉริยะ">
    <title>Smart Bin · เข้าสู่ระบบ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-wrap">
        <form id="loginForm" class="login-card" autocomplete="off">

            <div class="login-logo">
                <div class="login-logo-icon-svg">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
                        <rect width="48" height="48" rx="14" fill="var(--accent-dim)"/>
                        <path d="M16 20h16M18 20l1.5 12h9l1.5-12" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M21 20v-3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="login-logo-title">Smart Bin</div>
                <div class="login-logo-sub">IoT Waste Management System</div>
            </div>

            <div class="form-field">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="ชื่อผู้ใช้" required autocomplete="username">
            </div>
            <div class="form-field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="รหัสผ่าน" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn">เข้าสู่ระบบ</button>

            <div id="status-msg" class="login-status"></div>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let redirectUrl = urlParams.get('redirect') || '/home.html';
        if (redirectUrl.includes('login.html')) redirectUrl = '/home.html';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusMsg = document.getElementById('status-msg');
            const btn = e.target.querySelector('button[type="submit"]');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'กำลังตรวจสอบ...';
            statusMsg.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await response.json();

                if (result.success) {
                    statusMsg.style.display = 'block';
                    statusMsg.style.background = 'var(--green-dim)';
                    statusMsg.style.color = 'var(--green)';
                    statusMsg.textContent = 'เข้าสู่ระบบสำเร็จ กำลังโหลด...';
                    setTimeout(() => { window.location.href = redirectUrl; }, 1000);
                } else {
                    statusMsg.style.display = 'block';
                    statusMsg.style.background = 'var(--red-dim)';
                    statusMsg.style.color = 'var(--red)';
                    statusMsg.textContent = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
                    btn.disabled = false;
                    btn.textContent = 'เข้าสู่ระบบ';
                }
            } catch (error) {
                statusMsg.style.display = 'block';
                statusMsg.style.background = 'var(--red-dim)';
                statusMsg.style.color = 'var(--red)';
                statusMsg.textContent = 'ระบบขัดข้อง กรุณาลองใหม่อีกครั้ง';
                btn.disabled = false;
                btn.textContent = 'เข้าสู่ระบบ';
            }
        });
    </script>
</body>
</html>
