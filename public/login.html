<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="scanline"></div>

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="main-card" style="width: 100%; max-width: 400px; padding: 40px;">

            <h5 class="fw-bold mb-4 text-center"
                style="color: var(--cyan); text-shadow: 0 0 15px var(--cyan-glow); font-size: 20px;">
                SYSTEM AUTHORIZATION
            </h5>
            <hr>

            <div class="mb-4 mt-4">
                <label class="form-label text-muted small" style="letter-spacing: 2px;">USERNAME</label>
                <input type="text" id="username" class="form-control text-center" placeholder="ป้อนชื่อผู้ใช้"
                    style="font-size: 16px;">
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small" style="letter-spacing: 2px;">PASSWORD</label>
                <input type="password" id="password" class="form-control text-center" placeholder="ป้อนรหัสผ่าน"
                    style="font-size: 16px;">
            </div>

            <button class="btn btn-outline-light w-100 py-3 mt-2"
                style="border-color: var(--cyan); color: var(--cyan); font-size: 14px;" onclick="login()">
                [ ยืนยันตัวตน ]
            </button>

            <div id="error-msg" class="text-danger mt-3 text-center"
                style="display: none; text-shadow: 0 0 10px var(--danger-glow); font-family: var(--mono); font-size: 12px;">
            </div>

            <div class="mt-4 text-center">
                <a href="/" class="text-muted small text-decoration-none" style="font-family: var(--mono);">&lt;&lt;
                    กลับหน้าหลัก</a>
            </div>

        </div>
    </div>

    <script>
        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();

                if (data.success) {
                    // ถ้าล็อคอินผ่าน ให้พาไปหน้า Control ทันที
                    window.location.href = '/control.html';
                } else {
                    const err = document.getElementById('error-msg');
                    err.innerText = data.message;
                    err.style.display = 'block';
                }
            } catch (e) {
                console.log("Login Error", e);
            }
        }

        // อนุญาตให้กด Enter เพื่อ Login ได้เลย
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>

</html>
