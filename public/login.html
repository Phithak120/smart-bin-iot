<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="scanline"></div>
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <form id="loginForm" class="main-card" style="width: 100%; max-width: 400px; padding: 40px;">
            <h5 class="fw-bold mb-4 text-center"
                style="color: var(--cyan); text-shadow: 0 0 15px var(--cyan-glow); font-size: 20px;">
                SYSTEM AUTHORIZATION
            </h5>
            <hr>
            <div class="mb-4 mt-4">
                <label class="form-label text-muted small" style="letter-spacing: 2px;">USERNAME</label>
                <input type="text" id="username" class="form-control text-center" placeholder="ป้อนชื่อผู้ใช้" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small" style="letter-spacing: 2px;">PASSWORD</label>
                <input type="password" id="password" class="form-control text-center" placeholder="ป้อนรหัสผ่าน"
                    required>
            </div>
            <button type="submit" class="btn btn-outline-light w-100 py-3 mt-2"
                style="border-color: var(--cyan); color: var(--cyan); font-size: 14px;">
                [ ยืนยันตัวตน ]
            </button>
            <div id="status-msg" class="mt-3 text-center"
                style="display: none; font-family: var(--mono); font-size: 13px;"></div>
            <div class="mt-4 text-center">
                <a href="/" class="text-muted small text-decoration-none" style="font-family: var(--mono);">&lt;&lt;
                    กลับหน้าหลัก</a>
            </div>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let redirectUrl = urlParams.get('redirect') || '/home.html';
        if (redirectUrl.includes('login.html')) redirectUrl = '/home.html';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusMsg = document.getElementById('status-msg');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await response.json();

                if (result.success) {
                    // 🟢 แก้ไข: แสดงข้อความแทน Alert และหน่วงเวลา
                    statusMsg.style.display = 'block';
                    statusMsg.style.color = 'var(--cyan)';
                    statusMsg.innerText = '🔓 ยืนยันตัวตนสำเร็จ กำลังเข้าสู่ระบบ...';

                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 1200);
                } else {
                    statusMsg.style.display = 'block';
                    statusMsg.style.color = '#ff4d4d';
                    statusMsg.innerText = '❌ รหัสผ่านไม่ถูกต้อง';
                }
            } catch (error) {
                statusMsg.style.display = 'block';
                statusMsg.style.color = '#ff4d4d';
                statusMsg.innerText = '⚠️ ระบบขัดข้อง กรุณาลองใหม่';
            }
        });
    </script>
</body>

</html>
