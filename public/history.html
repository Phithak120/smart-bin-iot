<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Bin — ประวัติการบันทึกข้อมูลถังขยะ">
    <title>Smart Bin · ประวัติ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <span class="brand-dot"></span>
                ประวัติ
            </a>
            <div class="nav-actions">
                <a href="/" class="btn-nav">หน้าหลัก</a>
                <a href="/api/logout" class="btn-nav btn-danger">ออกจากระบบ</a>
            </div>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="card">
            <div class="card-title">
                <span class="card-title-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                </span>
                ค้นหาประวัติย้อนหลัง
            </div>

            <input type="date" id="date-filter" class="date-input mb-4"
                   placeholder="เลือกวันที่" onchange="loadHistory()">

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>วัน / เวลา</th>
                            <th>ระดับขยะ (%)</th>
                            <th>เซนเซอร์คน</th>
                        </tr>
                    </thead>
                    <tbody id="history-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="history.js"></script>
</body>
</html>
