<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bin History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="scanline"></div>

    <nav class="navbar navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">🗑️ History</a>
            <a href="/" class="btn btn-outline-light btn-sm">กลับหน้าหลัก</a>
        </div>
        <a href="/api/logout" class="btn btn-outline-light btn-sm"
            style="border-color: var(--danger); color: var(--danger);">ออกจากระบบ</a>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="main-card">
                    <h5 class="fw-bold mb-4">ค้นหาประวัติย้อนหลัง</h5>
                    <input type="date" id="date-filter" class="form-control mb-4" onchange="loadHistory()">

                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>วัน / เวลา</th>
                                    <th>ระดับขยะ (%)</th>
                                    <th>เซนเซอร์คน</th>
                                </tr>
                            </thead>
                            <tbody id="history-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="history.js"></script>
</body>

</html>
